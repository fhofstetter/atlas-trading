name: Feature
description: New capability or enhancement
labels: ["feat"]
body:
  - type: input
    id: summary
    attributes:
      label: What
      description: One sentence — what does this add or change?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why
      description: What problem does this solve? What's the user or system benefit?
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: Acceptance criteria
      description: Bullet list of observable conditions that must be true for this to be Done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      options: [XS, S, M, L, XL]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Design notes / links
      description: Relevant plans/, prior research, OSS references, or constraints. Optional.
